<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JV 2026 ilmoittautuminen</title>
</head>
<body>
  <h1>JV 2026 ilmoittautuminen</h1>

  <select id="shift_id"></select><br><br>
  <input id="first_name" placeholder="Etunimi"><br><br>
  <input id="last_name" placeholder="Sukunimi"><br><br>
  <input id="email" placeholder="Sähköposti"><br><br>
  <input id="phone" placeholder="Puhelin"><br><br>
  <input id="jv_card_number" placeholder="JV-kortin numero"><br><br>
  <input id="home_unit" placeholder="Paikkakunta / rauhanyhdistys"><br><br>

  <button onclick="submitSignup()">Ilmoittaudu vuoroon</button>
  <div id="formStatus"></div>

  <hr>
  <div id="list"></div>

<script>
let rows = [];
let formTouched = false;

document.addEventListener("input", () => {
  formTouched = true;
});

function formatFiDateTime(dbText) {
  const [datePart, timePart] = dbText.split(" ");
  const [y, m, d] = datePart.split("-");
  return `${d}.${m}.${y} ${timePart.slice(0,5)}`;
}

function formatRange(row) {
  return `${formatFiDateTime(row.start_at)} – ${formatFiDateTime(row.end_at)}`;
}

function render(rows, updateSelect = true) {
  const select = document.getElementById("shift_id");
  const oldValue = select.value;

  if (updateSelect && !formTouched) {
    const freeRows = rows.filter(r => r.free > 0);

    select.innerHTML = freeRows.map(r => {
      const selected = String(r.id) === String(oldValue) ? "selected" : "";
      return `<option value="${r.id}" ${selected}>${formatRange(r)} — vapaita: ${r.free}</option>`;
    }).join("");
  }

  document.getElementById("list").innerHTML = rows.map(r => `
    <div style="background:#dff0db; padding:12px; margin:10px 0; border-radius:8px;">
      <strong>${formatRange(r)}</strong><br>
      Henkilötarve: ${r.needed} · Vapaita paikkoja: ${r.free}
    </div>
  `).join("");
}

async function load(updateSelect = true) {
  const res = await fetch("/api/jv-public");
  rows = await res.json();
  render(rows, updateSelect);
}

async function submitSignup() {
  const formStatus = document.getElementById("formStatus");
  formStatus.textContent = "Tallennetaan...";

  const payload = {
    shift_id: Number(document.getElementById("shift_id").value),
    first_name: document.getElementById("first_name").value,
    last_name: document.getElementById("last_name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    jv_card_number: document.getElementById("jv_card_number").value,
    home_unit: document.getElementById("home_unit").value
  };

  const res = await fetch("/api/jv-public", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (!res.ok) {
    formStatus.textContent = data.error || "Tallennus epäonnistui";
    await load(false);
    return;
  }

  formStatus.textContent = "Ilmoittautuminen tallennettu.";

  ["first_name","last_name","email","phone","jv_card_number","home_unit"].forEach(id => {
    document.getElementById(id).value = "";
  });

  formTouched = false;
  await load(true);
}

load(true);
setInterval(() => load(false), 20000);
</script>
</body>
</html>
