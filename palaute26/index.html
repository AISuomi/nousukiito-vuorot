<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Palaute</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6f4;
      color: #1f2a1f;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    .formbox {
      padding: 16px;
      background: #dff0db;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    textarea {
      width: 100%;
      min-height: 300px;
      box-sizing: border-box;
      resize: vertical;
      padding: 13px;
      border: 1px solid #b7cdb4;
      border-radius: 9px;
      background: #fff;
      font-family: Arial, sans-serif;
      font-size: 16px;
      line-height: 1.45;
    }

    .counter {
      margin-top: 6px;
      text-align: right;
      font-size: 14px;
      color: #475569;
    }

    button {
      margin-top: 12px;
      padding: 12px 18px;
      border: 0;
      border-radius: 9px;
      background: #2f6f3e;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      font-size: 15px;
      color: #2f6f3e;
    }

    .honeypot {
      position: absolute;
      left: -10000px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 12px;
      }

      h1 {
        font-size: 24px;
      }

      textarea {
        min-height: 260px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Palaute</h1>

    <div class="formbox">
      <textarea
        id="message"
        maxlength="5000"
        aria-label="Palaute"
      ></textarea>

      <div class="counter">
        <span id="count">0</span> / 5000
      </div>

      <div class="honeypot" aria-hidden="true">
        <label>
          Verkkosivu
          <input
            id="website"
            type="text"
            tabindex="-1"
            autocomplete="off"
          >
        </label>
      </div>

      <button id="submitButton" onclick="sendFeedback()">
        Lähetä palaute
      </button>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const messageInput = document.getElementById("message");
    const countElement = document.getElementById("count");
    const statusElement = document.getElementById("status");
    const submitButton = document.getElementById("submitButton");

    messageInput.addEventListener("input", function () {
      countElement.textContent = messageInput.value.length;
    });

    async function sendFeedback() {
      const message = messageInput.value.trim();
      const website = document.getElementById("website").value;

      if (!message) {
        statusElement.textContent = "Kirjoita palaute.";
        messageInput.focus();
        return;
      }

      if (message.length > 5000) {
        statusElement.textContent =
          "Palaute saa olla enintään 5000 merkkiä.";
        return;
      }

      const lastSent = Number(
        localStorage.getItem("feedback26_last_sent") || 0
      );

      const secondsSinceLastSend =
        Math.floor((Date.now() - lastSent) / 1000);

      if (lastSent && secondsSinceLastSend < 30) {
        statusElement.textContent =
          "Odota hetki ennen uuden palautteen lähettämistä.";
        return;
      }

      submitButton.disabled = true;
      statusElement.textContent = "Lähetetään...";

      try {
        const response = await fetch("/api/feedback", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            website
          })
        });

        const data = await response.json();

        if (!response.ok) {
          statusElement.textContent =
            data.error || "Palautteen lähetys epäonnistui.";
          return;
        }

        localStorage.setItem(
          "feedback26_last_sent",
          String(Date.now())
        );

        messageInput.value = "";
        countElement.textContent = "0";
        statusElement.textContent = "Kiitos palautteesta.";
      } catch {
        statusElement.textContent =
          "Palautteen lähetys epäonnistui.";
      } finally {
        submitButton.disabled = false;
      }
    }
  </script>
</body>
</html>
