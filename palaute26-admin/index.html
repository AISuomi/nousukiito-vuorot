<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Palaute – ylläpito</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6f4;
      color: #1f2a1f;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    .login-box,
    .card {
      padding: 16px;
      margin-bottom: 14px;
      background: #dff0db;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #b7cdb4;
      border-radius: 8px;
      background: #fff;
      font-size: 16px;
    }

    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      background: #2f6f3e;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }

    button.secondary {
      background: #6b7280;
    }

    button.danger {
      background: #b91c1c;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .date {
      margin-bottom: 10px;
      font-size: 14px;
      color: #475569;
    }

    .message {
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .card-actions {
      margin-top: 14px;
    }

    .empty {
      padding: 20px;
      text-align: center;
      background: #dff0db;
      border-radius: 12px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 12px;
      }

      h1 {
        font-size: 24px;
      }

      .toolbar button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Palaute – ylläpito</h1>

    <div id="loginBox" class="login-box">
      <input
        id="password"
        type="password"
        placeholder="Admin-salasana"
      >

      <button onclick="login()">Kirjaudu</button>
    </div>

    <div id="app" class="hidden">
      <div class="toolbar">
        <button class="secondary" onclick="logout()">
          Kirjaudu ulos
        </button>

        <button onclick="downloadCsv()">
          Lataa CSV
        </button>

        <button class="danger" onclick="deleteAll()">
          Tyhjennä kaikki
        </button>
      </div>

      <div id="list"></div>
    </div>
  </div>

  <script>
    const group = "palaute26_admin";
    const tokenKey = "token_" + group;

    let token = localStorage.getItem(tokenKey);
    let feedbackRows = [];

    async function login() {
      const password =
        document.getElementById("password").value;

      const response = await fetch(
        "/api/login?group=" + group,
        {
          method: "POST",
          body: password
        }
      );

      const data = await response.json();

      if (!data.token) {
        alert("Väärä salasana");
        return;
      }

      localStorage.setItem(tokenKey, data.token);
      location.reload();
    }

    function logout() {
      localStorage.removeItem(tokenKey);
      location.reload();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(timestamp) {
      const date = new Date(Number(timestamp) * 1000);

      return date.toLocaleString("fi-FI", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function load() {
      const response = await fetch("/api/feedback-admin", {
        headers: {
          Authorization: token
        }
      });

      if (response.status === 401) {
        logout();
        return;
      }

      if (!response.ok) {
        document.getElementById("list").innerHTML =
          '<div class="empty">Palautteiden lataaminen epäonnistui.</div>';
        return;
      }

      feedbackRows = await response.json();
      render();
    }

    function render() {
      const list = document.getElementById("list");

      if (feedbackRows.length === 0) {
        list.innerHTML =
          '<div class="empty">Ei palautteita.</div>';
        return;
      }

      list.innerHTML = feedbackRows.map(row => `
        <div class="card">
          <div class="date">
            ${escapeHtml(formatDate(row.created_at))}
          </div>

          <div class="message">${escapeHtml(row.message)}</div>

          <div class="card-actions">
            <button
              class="danger"
              onclick="deleteOne(${Number(row.id)})"
            >
              Poista
            </button>
          </div>
        </div>
      `).join("");
    }

    async function deleteOne(id) {
      const confirmed = confirm(
        "Poistetaanko tämä palaute pysyvästi?"
      );

      if (!confirmed) return;

      const response = await fetch("/api/feedback-admin", {
        method: "POST",
        headers: {
          Authorization: token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          action: "delete_one",
          id
        })
      });

      if (!response.ok) {
        alert("Poisto epäonnistui.");
        return;
      }

      await load();
    }

    async function deleteAll() {
      const confirmed = confirm(
        "Poistetaanko kaikki palautteet pysyvästi?"
      );

      if (!confirmed) return;

      const secondConfirmation = confirm(
        "Tätä toimintoa ei voi perua. Jatketaanko?"
      );

      if (!secondConfirmation) return;

      const response = await fetch("/api/feedback-admin", {
        method: "POST",
        headers: {
          Authorization: token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          action: "delete_all"
        })
      });

      if (!response.ok) {
        alert("Palautteiden poistaminen epäonnistui.");
        return;
      }

      await load();
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return '"' + text.replaceAll('"', '""') + '"';
    }

    function downloadCsv() {
      if (feedbackRows.length === 0) {
        alert("Ei ladattavia palautteita.");
        return;
      }

      const lines = [
        [
          "Aika",
          "Palaute"
        ].map(csvCell).join(";")
      ];

      feedbackRows.forEach(row => {
        lines.push([
          formatDate(row.created_at),
          row.message
        ].map(csvCell).join(";"));
      });

      const csv =
        "\uFEFF" + lines.join("\r\n");

      const blob = new Blob(
        [csv],
        { type: "text/csv;charset=utf-8" }
      );

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "palautteet-2026.csv";

      document.body.appendChild(link);
      link.click();
      link.remove();

      URL.revokeObjectURL(url);
    }

    if (token) {
      document
        .getElementById("loginBox")
        .classList.add("hidden");

      document
        .getElementById("app")
        .classList.remove("hidden");

      load();
    }
  </script>
</body>
</html>
